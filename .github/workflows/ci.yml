name: copilot-governance-lab-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .[dev]
      - name: Test
        run: pytest
      - name: Generate synthetic evidence
        run: python -m stc_copilot_lab.cli evaluate --fixtures data/fixtures --out evidence/generated --workspace --doctrine-alignment
